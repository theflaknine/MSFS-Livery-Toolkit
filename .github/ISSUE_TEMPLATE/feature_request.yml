name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the workflow or problem behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like the toolkit to do?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Anything you've tried or considered
